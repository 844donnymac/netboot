#### ==========================================================================
###  Base Debian 13 (Trixie) Preseed — Fixed "No root file system"
###  iPXE 2.0 + Synology HTTP + Mikrotik ROS7 DHCP
###  Single large / partition (atomic), SSH keys only, random hostname
#### ==========================================================================

### Early command — Aggressive wipe + reliable disk selection for partman
d-i preseed/early_command string \
    umount /media 2>/dev/null || true; \
    swapoff -a 2>/dev/null || true; \
    for vg in $(vgs --noheadings -o vg_name 2>/dev/null); do vgchange -an $vg 2>/dev/null || true; done; \
    dmsetup remove_all 2>/dev/null || true; \
    mdadm --stop --scan 2>/dev/null || true; \
    for dev in $(list-devices disk); do \
      wipefs -a $dev 2>/dev/null || true; \
      dd if=/dev/zero of=$dev bs=1M count=10 status=none || true; \
    done; \
    sleep 5; \
    udevadm settle --timeout=10 || true; \
    partprobe || true; \
    DISK=$(list-devices disk | head -n1); \
    echo "partman-auto/disk string $DISK" | debconf-set-selections; \
    echo "partman-auto/method string regular" | debconf-set-selections; \
    echo "partman-auto/choose_recipe select atomic" | debconf-set-selections; \
    echo "partman-auto/init_automatically_partition select biggest_free" | debconf-set-selections

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/enable boolean true
d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 30
d-i netcfg/get_hostname string unassigned-hostname
d-i netcfg/get_domain string local

### Mirror
d-i mirror/protocol string http
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Accounts — SSH key only
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string dmcmorris
d-i passwd/username string dmcmorris
d-i passwd/user-password-crypted password !
d-i passwd/user-default-groups string sudo

### Timezone — South Venice, Florida
d-i clock-setup/utc boolean true
d-i time/zone string America/New_York
d-i clock-setup/ntp boolean true

### Partitioning — Atomic single /
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-basicfilesystems/no_swap boolean true

# Strong confirmations (critical for "no root fs" fix)
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-md/confirm boolean true

### Packages
d-i tasksel/tasksel/first multiselect standard
d-i pkgsel/include string \
  openssh-server vim less sudo curl wget git \
  avahi-daemon avahi-utils network-manager
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
d-i base-installer/install-recommends boolean false

popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/sda
d-i grub-installer/with_other_os boolean true

### Kernel
d-i debian-installer/add-kernel-opts string ipv6.disable=1

### Late command — Random hostname + SSH keys + hardening
d-i preseed/late_command string \
  in-target sh -c ' \
    set -e; \
    echo "=== late_command started $(date) ===" > /var/log/base-install.log 2>&1; \
    RANDOM_SUFFIX=$(tr -dc A-Za-z0-9 < /dev/urandom | head -c6); \
    NEW_HOSTNAME=debian-${RANDOM_SUFFIX}; \
    echo "${NEW_HOSTNAME}" > /etc/hostname; \
    sed -i "s/127.0.1.1.*/127.0.1.1 ${NEW_HOSTNAME} ${NEW_HOSTNAME}.local/" /etc/hosts; \
    hostnamectl set-hostname "${NEW_HOSTNAME}" || true; \
    mkdir -p /home/dmcmorris/.ssh; \
    curl -fsSL --max-time 60 --retry 5 \
      https://raw.githubusercontent.com/844donnymac/netboot/main/authorized_keys \
      > /home/dmcmorris/.ssh/authorized_keys || true; \
    chown -R dmcmorris:dmcmorris /home/dmcmorris/.ssh; \
    chmod 700 /home/dmcmorris/.ssh; \
    chmod 600 /home/dmcmorris/.ssh/authorized_keys; \
    sed -i "s/#PasswordAuthentication yes/PasswordAuthentication no/" /etc/ssh/sshd_config; \
    sed -i "s/#PermitRootLogin.*/PermitRootLogin no/" /etc/ssh/sshd_config; \
    systemctl restart ssh || true; \
    echo "=== late_command finished successfully $(date) ===" >> /var/log/base-install.log; \
  ' || true